name: Daily Opportunity Scraper

on:
  schedule:
    - cron: "0 8 * * *"   # 8am UTC every day
  workflow_dispatch:        # lets you trigger it manually from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Debug secrets
        run: |
          echo "URL length: ${#SUPABASE_URL}"
          echo "KEY length: ${#SUPABASE_SERVICE_ROLE_KEY}"
        env:
          SUPABASE_URL: ${{ secrets.SB_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SB_SERVICE_KEY }}

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SB_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SB_SERVICE_KEY }}
        
      -name: Test env in scraper context
        env:
          SUPABASE_URL: ${{ secrets.SB_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SB_SERVICE_KEY }}
        run: node -e "console.log('URL:', process.env.SUPABASE_URL ? process.env.SUPABASE_URL.slice(0,10) : 'EMPTY')"
        
        run: node scraper.js

        
